name: sam_sama_alal
description: Application mobile offline-first de gestion financière pour commerçants.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cloud_firestore: ^4.17.5
  crypto: ^3.0.3
  firebase_auth: ^4.20.0
  firebase_core: ^2.32.0
  image_picker: ^1.1.0
  fl_chart: ^0.68.0
  flutter_form_builder: ^9.3.0
  flutter_local_notifications: ^17.2.1
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  pdf: ^3.11.0
  path_provider: ^2.1.5
  pinput: ^5.0.0
  share_plus: ^9.0.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/wallet.png
